<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - CloudLens AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-glow: rgba(99, 102, 241, 0.4);
            --secondary: #a855f7;
            --bg-dark: #02020a;
            --card-bg: rgba(13, 13, 25, 0.7);
            --text-main: #ffffff;
            --text-muted: #94a3b8;
            --input-bg: rgba(255, 255, 255, 0.02);
            --transition: all 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Background Image & Grid */
        .bg-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            object-fit: cover;
            opacity: 0.15;
            filter: grayscale(100%) brightness(0.5);
        }

        .bg-grid {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
        }

        /* Animated Background */
        .bg-glow {
            position: absolute;
            width: 800px;
            height: 800px;
            border-radius: 50%;
            filter: blur(140px);
            z-index: -1;
            opacity: 0.35;
            animation: pulse 25s ease-in-out infinite alternate;
        }

        .glow-blue {
            background: radial-gradient(circle, #3b82f6, transparent 70%);
            top: -300px;
            left: -200px;
        }

        .glow-purple {
            background: radial-gradient(circle, #a855f7, transparent 70%);
            bottom: -300px;
            right: -200px;
        }

        .glow-mint {
            background: radial-gradient(circle, #10b981, transparent 70%);
            top: 40%;
            right: -400px;
            width: 600px;
            height: 600px;
            opacity: 0.15;
            animation: pulse-delayed 30s ease-in-out infinite alternate;
        }

        @keyframes pulse {
            0% { transform: scale(1) translate(0, 0) rotate(0deg); opacity: 0.3; }
            100% { transform: scale(1.2) translate(100px, 100px) rotate(15deg); opacity: 0.5; }
        }

        @keyframes pulse-delayed {
            0% { transform: scale(1) translate(0, 0); opacity: 0.1; }
            100% { transform: scale(1.3) translate(-100px, -50px); opacity: 0.25; }
        }

        .login-container {
            width: 100%;
            max-width: 440px;
            padding: 20px;
            z-index: 1;
        }

        .login-card {
            background: var(--card-bg);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-top: 1px solid rgba(255, 255, 255, 0.12);
            border-left: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 32px;
            padding: 48px;
            box-shadow: 
                0 30px 60px -12px rgba(0, 0, 0, 0.7),
                inset 0 0 20px rgba(255, 255, 255, 0.02);
            animation: slideUp 1s cubic-bezier(0.2, 0.8, 0.2, 1);
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .logo-icon {
            width: 56px;
            height: 56px;
            margin-bottom: 28px;
            border-radius: 14px;
            background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 20px -5px rgba(99, 102, 241, 0.5);
            position: relative;
        }

        .logo-icon::after {
            content: '';
            position: absolute;
            inset: -2px;
            border-radius: 16px;
            background: linear-gradient(135deg, #6366f1, #a855f7);
            z-index: -1;
            opacity: 0.3;
            filter: blur(8px);
        }

        .logo-icon svg {
            width: 32px;
            height: 32px;
            color: white;
        }

        .logo-text {
            font-size: 28px;
            color: white;
            letter-spacing: -0.04em;
            margin-bottom: 6px;
            font-weight: 700;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 15px;
            font-weight: 400;
            letter-spacing: 0.01em;
        }

        form {
            width: 100%;
        }

        .form-group {
            margin-bottom: 20px;
            width: 100%;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 11px;
            font-weight: 600;
            color: #9ca3af;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            padding-left: 4px;
        }

        .input-wrapper svg {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            width: 18px;
            height: 18px;
            color: #4b5563;
            transition: var(--transition);
            pointer-events: none;
        }

        input {
            width: 100%;
            background: var(--input-bg);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 14px;
            padding: 14px 16px 14px 44px;
            color: white;
            font-size: 15px;
            outline: none;
            transition: var(--transition);
        }

        input:focus {
            border-color: rgba(99, 102, 241, 0.6);
            background: rgba(255, 255, 255, 0.04);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.15);
        }

        input:focus + svg {
            color: var(--primary);
        }

        input::placeholder {
            color: #4b5563;
        }

        .forgot-password-area {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            user-select: none;
        }

        .remember-me input[type="checkbox"] {
            appearance: none;
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 4px;
            background: rgba(255, 255, 255, 0.05);
            cursor: pointer;
            position: relative;
            transition: var(--transition);
            margin: 0;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .remember-me input[type="checkbox"]:checked {
            background: var(--primary);
            border-color: var(--primary);
        }

        .remember-me input[type="checkbox"]:checked::after {
            content: '\2713';
            color: white;
            font-size: 10px;
            font-weight: 800;
        }

        .remember-me label {
            font-size: 12px;
            color: var(--text-muted);
            cursor: pointer;
            font-weight: 500;
        }

        .forgot-password-link, .security-help-link {
            font-size: 12px;
            font-weight: 500;
            color: #818cf8;
            text-decoration: none;
            transition: var(--transition);
        }

        .forgot-password-link:hover, .security-help-link:hover {
            color: #a5b4fc;
        }

        .security-help-link {
            color: var(--text-muted);
            opacity: 0.7;
        }

        .security-help-link:hover {
            opacity: 1;
        }

        .login-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            border: none;
            border-radius: 14px;
            color: white;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            box-shadow: 0 10px 20px -5px rgba(99, 102, 241, 0.4);
            position: relative;
            z-index: 1;
            overflow: hidden;
        }

        .login-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                90deg,
                transparent,
                rgba(255, 255, 255, 0.2),
                transparent
            );
            transition: 0.6s;
            z-index: -1;
        }

        .login-btn:hover::before {
            left: 100%;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px -5px rgba(99, 102, 241, 0.5);
            filter: brightness(1.1);
        }

        .links {
            margin-top: 32px;
            padding-top: 24px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            text-align: center;
            width: 100%;
        }

        .links p {
            color: #6b7280;
            font-size: 14px;
        }

        .links a {
            color: white;
            text-decoration: none;
            font-weight: 500;
            transition: var(--transition);
        }

        .links a:hover {
            text-decoration: underline;
        }

        .alt-signup {
            margin-top: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .alt-signup a {
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-weight: 600;
        }

        .alt-signup .dot {
            width: 4px;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
        }

        .social-icons {
            margin-top: 32px;
            display: flex;
            gap: 16px;
            opacity: 0.4;
            transition: opacity 0.3s ease;
        }

        .social-icons:hover {
            opacity: 1;
        }

        .social-btn {
            width: 32px;
            height: 32px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 10px;
            font-weight: 700;
            color: white;
        }

        /* Mobile Adjustments */
        @media (max-width: 480px) {
            .login-card {
                padding: 32px 24px;
                border-radius: 24px;
            }
            .logo-text {
                font-size: 22px;
            }
        }
    </style>
</head>
<body>
    <img src="https://images.unsplash.com/photo-1451187580459-43490279c0fa?q=80&w=2072&auto=format&fit=crop" alt="Abstract Tech Background" class="bg-image" referrerPolicy="no-referrer">
    <div class="bg-grid"></div>
    <div class="bg-glow glow-blue"></div>
    <div class="bg-glow glow-purple"></div>
    <div class="bg-glow glow-mint"></div>
    
    <div class="login-container">
        <div class="login-card">
            <div class="header">
                <div class="logo-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                    </svg>
                </div>
                <h1 class="logo-text">CloudLens AI</h1>
                <p class="subtitle">Smart Cloud Cost Intelligence</p>
            </div>

            <form onsubmit="return false;">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <div class="input-wrapper">
                        <input type="email" id="email" placeholder="name@company.com" required>
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
                        </svg>
                    </div>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="input-wrapper">
                        <input type="password" id="password" placeholder="••••••••" required>
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                        </svg>
                    </div>
                </div>

                <div class="forgot-password-area">
                    <div class="remember-me">
                        <input type="checkbox" id="remember">
                        <label for="remember">Remember Me</label>
                    </div>
                    <div style="display: flex; gap: 12px;">
                        <a href="#" class="forgot-password-link">Forgot Password?</a>
                        <a href="#" class="security-help-link">Security Help</a>
                    </div>
                </div>

                <button type="submit" class="login-btn">Sign In to Dashboard</button>
            </form>

            <div class="links">
                <p>New to CloudLens? <a href="#">Create Account</a></p>
                <div class="alt-signup">
                    <a href="#">Enterprise SSO</a>
                    <span class="dot"></span>
                    <a href="#">Schedule a Demo</a>
                </div>
            </div>

            <div class="social-icons">
                <div class="social-btn" title="Sign in with Google">
                    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12.48 10.92v3.28h7.84c-.24 1.84-.853 3.187-1.787 4.133-1.147 1.147-2.933 2.4-6.053 2.4-4.827 0-8.6-3.893-8.6-8.72s3.773-8.72 8.6-8.72c2.6 0 4.507 1.027 5.907 2.347l2.307-2.307C18.747 1.44 16.133 0 12.48 0 5.867 0 .307 5.387.307 12s5.56 12 12.173 12c3.573 0 6.267-1.173 8.373-3.36 2.16-2.16 2.84-5.213 2.84-7.667 0-.76-.053-1.467-.173-2.053H12.48z"/></svg>
                </div>
                <div class="social-btn" title="Sign in with Apple">
                    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M17.05 20.28c-.96.95-2.18 2.34-3.84 2.36-1.61.02-2.13-1-4.04-1-1.92 0-2.5.98-4.03 1-1.63.02-2.88-1.55-3.84-2.36-4.14-5.91-3.21-11.87 0-14.7.96-1.55 2.5-2.5 4.19-2.5 1.63 0 2.5 1 4.16 1 1.63 0 2.5-1 4.16-1 1.69 0 3.23.95 4.19 2.5-1.14.73-1.89 2-1.89 3.5 0 1.5.75 2.77 1.89 3.5-.96 1.55-2.18 2.54-3.84 2.36-.01 0-.01 0 0 0zM12.03 4.67c-1.14-1.39-1.89-3.32-1.89-5.25.01-.01.01-.01.02-.02 1.93-.01 3.86.75 5.25 1.89s1.89 3.32 1.89 5.25c-.01.01-.01.01-.02.02-1.93.01-3.86-.75-5.25-1.89z"/></svg>
                </div>
                <div class="social-btn" title="Sign in with Slack">
                    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M5.042 15.165a2.528 2.528 0 0 1-2.52 2.523A2.528 2.528 0 0 1 0 15.165a2.527 2.527 0 0 1 2.522-2.52h2.52v2.52zM6.313 15.165a2.527 2.527 0 0 1 2.521-2.52 2.527 2.527 0 0 1 2.521 2.52v6.313A2.528 2.528 0 0 1 8.834 24a2.528 2.528 0 0 1-2.521-2.522v-6.313zM8.834 5.042a2.528 2.528 0 0 1-2.521-2.52A2.528 2.528 0 0 1 8.834 0a2.528 2.528 0 0 1 2.521 2.522v2.52H8.834zM8.834 6.313a2.527 2.527 0 0 1 2.521 2.521 2.527 2.527 0 0 1-2.521 2.521H2.522A2.528 2.528 0 0 1 0 8.834a2.528 2.528 0 0 1 2.522-2.521h6.312zM18.958 8.834a2.528 2.528 0 0 1 2.522-2.521A2.528 2.528 0 0 1 24 8.834a2.528 2.528 0 0 1-2.52 2.521h-2.522V8.834zM17.687 8.834a2.527 2.527 0 0 1-2.521 2.521 2.527 2.527 0 0 1-2.521-2.521V2.522A2.527 2.527 0 0 1 15.166 0a2.528 2.528 0 0 1 2.521 2.522v6.312zM15.166 18.958a2.528 2.528 0 0 1 2.521 2.521 2.528 2.528 0 0 1-2.521 2.521 2.528 2.528 0 0 1-2.521-2.521v-2.522h2.521zM15.166 17.687a2.527 2.527 0 0 1-2.521-2.521 2.527 2.527 0 0 1 2.521-2.521h6.313A2.527 2.527 0 0 1 24 15.166a2.528 2.528 0 0 1-2.521 2.521h-6.313z"/></svg>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
